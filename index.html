<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #ui-overlay { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; color: white; font-family: sans-serif; text-align: center; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
    </style>
  </head>
  <body>
    <div id="ui-overlay">Scan the Building to see the Animation</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="buildingAnim" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/softmind/scene.gltf"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#buildingAnim" 
                      position="0 0 0.2" 
                      scale="0.01 0.01 0.01"
                      animation="property: rotation; to: 0 360 0; dur: 5000; easing: linear; loop: true">
        </a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
